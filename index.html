<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ỦY BAN MẶT TRẬN TỔ QUỐC VIỆT NAM PHƯỜNG AN KHÁNH - OCR NÂNG CAO</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="https://unpkg.com/tesseract.js@v4.0.1/dist/tesseract.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <style>
        :root { --primary: #d63031; --success: #28a745; --info: #0984e3; --bg: #f4f6f9; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg); margin: 0; padding: 20px; }
        
        .header-box { text-align: center; margin-bottom: 30px; border-bottom: 2px solid var(--primary); padding-bottom: 15px; }
        .header-box h2 { color: var(--primary); margin: 0; text-transform: uppercase; font-size: 22px; letter-spacing: 1px; }
        .header-box p { margin: 5px 0 0; color: #555; font-weight: bold; }

        .app-container { max-width: 1300px; margin: 0 auto; display: grid; grid-template-columns: 350px 1fr; gap: 20px; }
        .sidebar { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 25px rgba(0,0,0,0.1); height: fit-content; }
        .dropzone { border: 2px dashed var(--info); padding: 30px; border-radius: 12px; text-align: center; cursor: pointer; background: #f8fbff; margin-bottom: 20px; }
        
        #textEditor { width: 100%; height: 700px; border: 1px solid #ddd; padding: 20px; border-radius: 10px; font-size: 16px; line-height: 1.8; font-family: 'Times New Roman', serif; outline: none; box-sizing: border-box; }
        
        .status-msg { font-size: 13px; color: var(--primary); font-weight: bold; margin: 10px 0; min-height: 20px; }
        .btn-group { display: flex; flex-direction: column; gap: 10px; }
        button { padding: 14px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.2s; color: white; }
        .btn-run { background: var(--info); }
        .btn-export { background: var(--success); display: none; }
        
        .toggle-box { background: #f1f2f6; padding: 10px; border-radius: 8px; margin-bottom: 15px; display: flex; align-items: center; justify-content: space-between; }
        .toggle-box label { font-size: 13px; font-weight: bold; color: #2f3542; }
    </style>
</head>
<body>

<div class="header-box">
    <h2>ỦY BAN MẶT TRẬN TỔ QUỐC VIỆT NAM PHƯỜNG AN KHÁNH</h2>
    <p>HỆ THỐNG SỐ HÓA VÀ NHẬN DẠNG TÀI LIỆU (OCR) - CHẾ ĐỘ LỌC TẠP ÂM</p>
</div>

<div class="app-container">
    <div class="sidebar">
        <div class="dropzone" onclick="document.getElementById('fileInput').click()">
            <strong id="fileName">Tải tài liệu lên</strong>
            <input type="file" id="fileInput" accept=".pdf, image/*" hidden>
        </div>

        <div class="toggle-box">
            <label>Tự động lọc tạp âm (Khuyên dùng):</label>
            <input type="checkbox" id="denoiseToggle" checked>
        </div>

        <div style="margin-bottom: 15px;">
            <label><b>Font chữ xuất Word:</b></label>
            <select id="fontSelect" style="width:100%; padding:8px; border-radius:5px;">
                <option value="'Times New Roman', serif">Times New Roman</option>
                <option value="Arial, sans-serif">Arial</option>
            </select>
        </div>

        <div id="status" class="status-msg">Hệ thống sẵn sàng.</div>
        <div style="height: 8px; background: #eee; border-radius: 4px; overflow: hidden; margin-bottom: 15px; display: none;" id="pBar">
            <div id="pFill" style="height: 100%; background: var(--success); width: 0%;"></div>
        </div>

        <div class="btn-group">
            <button class="btn-run" id="startBtn">BẮT ĐẦU NHẬN DẠNG</button>
            <button class="btn-export" id="btnW" onclick="exportWord()">Tải Word (.doc)</button>
            <button class="btn-export" id="btnE" onclick="exportExcel()">Tải Excel (.xlsx)</button>
            <button style="background:#636e72" onclick="copyText()">Sao chép văn bản</button>
        </div>
    </div>

    <div class="main-content">
        <textarea id="textEditor" placeholder="Kết quả sẽ hiển thị ở đây..."></textarea>
    </div>
</div>

<canvas id="processCanvas" style="display: none;"></canvas>

<script>
    const pdfjsLib = window['pdfjs-dist/build/pdf'];
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

    const fileInput = document.getElementById('fileInput');
    const textEditor = document.getElementById('textEditor');
    const status = document.getElementById('status');
    const pBar = document.getElementById('pBar');
    const pFill = document.getElementById('pFill');
    const denoiseToggle = document.getElementById('denoiseToggle');

    fileInput.onchange = () => { if(fileInput.files[0]) document.getElementById('fileName').innerText = fileInput.files[0].name; };

    document.getElementById('startBtn').onclick = async () => {
        const file = fileInput.files[0];
        if (!file) return alert("Vui lòng chọn file!");
        
        setLoading(true);
        if (file.type === "application/pdf") {
            await handlePDF(file);
        } else {
            const processedImg = await preprocessImage(file);
            await handleOCR(processedImg);
        }
    };

    // HÀM LỌC TẠP ÂM (Denoising & Contrast)
    async function preprocessImage(source) {
        if (!denoiseToggle.checked) return source;
        
        return new Promise((resolve) => {
            const img = new Image();
            img.onload = () => {
                const canvas = document.getElementById('processCanvas');
                const ctx = canvas.getContext('2d');
                canvas.width = img.width;
                canvas.height = img.height;
                
                // 1. Vẽ ảnh lên canvas
                ctx.drawImage(img, 0, 0);
                
                // 2. Thuật toán lọc: Chuyển xám và tăng tương phản
                const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                const data = imageData.data;
                for (let i = 0; i < data.length; i += 4) {
                    let avg = (data[i] + data[i + 1] + data[i + 2]) / 3;
                    // Ngưỡng lọc (Threshold): Nếu màu xám > 160 thì cho thành trắng hẳn, ngược lại đen hẳn
                    let val = avg > 160 ? 255 : 0; 
                    data[i] = data[i+1] = data[i+2] = val;
                }
                ctx.putImageData(imageData, 0, 0);
                resolve(canvas.toDataURL("image/png"));
            };
            img.src = URL.createObjectURL(source instanceof Blob ? source : source);
        });
    }

    async function handleOCR(source) {
        status.innerText = "Đang lọc tạp âm & Nhận diện chữ...";
        const { data: { text } } = await Tesseract.recognize(source, 'vie');
        textEditor.value = smartFix(text);
        finish();
    }

    async function handlePDF(file) {
        const reader = new FileReader();
        reader.readAsArrayBuffer(file);
        reader.onload = async function() {
            const pdf = await pdfjsLib.getDocument({data: reader.result, cMapUrl: 'https://cdn.jsdelivr.net/npm/pdfjs-dist@3.4.120/cmaps/', cMapPacked: true}).promise;
            let output = "";
            for (let i = 1; i <= pdf.numPages; i++) {
                status.innerText = `Xử lý trang ${i}/${pdf.numPages}`;
                const page = await pdf.getPage(i);
                
                // Chuyển trang PDF thành ảnh để lọc tạp âm
                const viewport = page.getViewport({scale: 2.5});
                const canvas = document.createElement('canvas');
                canvas.height = viewport.height; canvas.width = viewport.width;
                await page.render({canvasContext: canvas.getContext('2d'), viewport}).promise;
                
                const filteredPage = await preprocessImage(canvas.toDataURL());
                const { data: { text } } = await Tesseract.recognize(filteredPage, 'vie');
                
                output += smartFix(text) + "\n\n";
                textEditor.value = output;
                pFill.style.width = (i / pdf.numPages * 100) + "%";
            }
            finish();
        };
    }

    function smartFix(str) {
        if (!str) return "";
        return str.normalize('NFC')
            .replace(/([A-ZÀ-Ỹ])\s(?=[A-ZÀ-Ỹ]\s)/g, '$1')
            .replace(/([a-zà-ỹ])\s(?=[a-zà-ỹ]\s)/g, '$1')
            .replace(/\s{2,}/g, ' ')
            .replace(/\s([.,!?:;])/g, '$1')
            .trim();
    }

    function setLoading(is) {
        pBar.style.display = is ? 'block' : 'none';
        document.querySelectorAll('.btn-export').forEach(b => b.style.display = 'none');
    }

    function finish() {
        status.innerText = "Hoàn thành!";
        document.querySelectorAll('.btn-export').forEach(b => b.style.display = 'block');
    }

    function exportWord() {
        const font = document.getElementById('fontSelect').value;
        const html = `<html><head><meta charset='utf-8'><style>body{font-family:${font}; line-height:1.6;}</style></head><body>${textEditor.value.replace(/\n/g, '<br>')}</body></html>`;
        const blob = new Blob(['\ufeff', html], { type: 'application/msword' });
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = "Van_ban_An_Khanh.doc"; a.click();
    }

    function exportExcel() {
        const rows = textEditor.value.split('\n').filter(r => r.trim()).map(r => [r]);
        const ws = XLSX.utils.aoa_to_sheet(rows);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "OCR");
        XLSX.writeFile(wb, "Du_lieu_An_Khanh.xlsx");
    }

    function copyText() { textEditor.select(); document.execCommand('copy'); alert("Đã sao chép!"); }
</script>
</body>
</html>
