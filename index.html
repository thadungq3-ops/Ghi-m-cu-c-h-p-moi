<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ thống Chuyển văn bản sang Word</title>
    <script src="https://unpkg.com/docx@7.1.0/build/index.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

    <style>
        :root {
            --primary-blue: #004a8c;
            --bg-gray: #f8f9fa;
        }

        body {
            font-family: 'Times New Roman', Times, serif;
            background-color: var(--bg-gray);
            padding: 40px;
            margin: 0;
        }

        .container {
            max-width: 850px;
            margin: 0 auto;
            background: white;
            padding: 50px;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
            border-radius: 4px;
        }

        .main-title {
            text-align: center;
            color: var(--primary-blue);
            text-transform: uppercase;
            font-size: 22px;
            margin-bottom: 30px;
            letter-spacing: 1px;
            border-bottom: 2px solid var(--primary-blue);
            padding-bottom: 10px;
        }

        .control-bar {
            text-align: center;
            margin-bottom: 20px;
            display: flex;
            justify-content: center;
            gap: 10px;
        }

        button {
            font-family: 'Times New Roman', serif;
            font-size: 16px;
            padding: 10px 20px;
            cursor: pointer;
            border: none;
            border-radius: 4px;
            transition: 0.3s;
        }

        .btn-record { background-color: #d42020; color: white; }
        .btn-stop { background-color: #6c757d; color: white; display: none; }
        .btn-word { background-color: #2b579a; color: white; } /* Màu đặc trưng của Word */

        #status {
            text-align: center;
            height: 25px;
            color: #d42020;
            font-weight: bold;
            margin-bottom: 10px;
        }

        #transcript {
            width: 100%;
            min-height: 450px;
            border: 1px solid #ced4da;
            padding: 20px;
            font-size: 14pt; /* Kích chuẩn văn bản hành chính */
            line-height: 1.5;
            box-sizing: border-box;
            white-space: pre-wrap;
            outline: none;
        }

        .footer {
            margin-top: 20px;
            font-size: 12px;
            color: #6c757d;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="container">
    <h1 class="main-title">HỆ THỐNG GHI ÂM VÀ CHUYỂN ĐỔI BIÊN BẢN HỌP</h1>

    <div id="status"></div>

    <div class="control-bar">
        <button id="startBtn" class="btn-record" onclick="startRecognition()">BẮT ĐẦU GHI ÂM</button>
        <button id="stopBtn" class="btn-stop" onclick="stopRecognition()">DỪNG</button>
        <button class="btn-word" onclick="exportToWord()">XUẤT FILE WORD (.DOCX)</button>
    </div>

    <div id="transcript" contenteditable="true">Nhấp vào "Bắt đầu" và nói để chuyển thành văn bản...</div>

    <div class="footer">
        Cổng thông tin hỗ trợ nghiệp vụ văn phòng nội bộ
    </div>
</div>

<script>
    let recognition;
    if ('webkitSpeechRecognition' in window) {
        recognition = new webkitSpeechRecognition();
        recognition.continuous = true;
        recognition.interimResults = true;
        recognition.lang = 'vi-VN';

        recognition.onresult = (event) => {
            let final_transcript = '';
            for (let i = event.resultIndex; i < event.results.length; ++i) {
                if (event.results[i].isFinal) {
                    final_transcript += event.results[i][0].transcript + '. ';
                }
            }
            if (final_transcript) {
                const box = document.getElementById('transcript');
                if(box.innerText.includes("Nhấp vào")) box.innerText = "";
                box.innerText += final_transcript;
            }
        };

        recognition.onstart = () => {
            document.getElementById('status').innerText = "🔴 ĐANG GHI ÂM...";
        };

        recognition.onend = () => {
            document.getElementById('status').innerText = "";
        };
    }

    function startRecognition() {
        recognition.start();
        document.getElementById('startBtn').style.display = 'none';
        document.getElementById('stopBtn').style.display = 'inline-block';
    }

    function stopRecognition() {
        recognition.stop();
        document.getElementById('startBtn').style.display = 'inline-block';
        document.getElementById('stopBtn').style.display = 'none';
    }

    // Hàm xuất file Word sử dụng thư viện docx
    async function exportToWord() {
        const content = document.getElementById('transcript').innerText;
        const { Document, Packer, Paragraph, TextRun } = docx;

        const doc = new Document({
            sections: [{
                properties: {},
                children: [
                    new Paragraph({
                        children: [
                            new TextRun({
                                text: content,
                                font: "Times New Roman",
                                size: 28, // 14pt trong Word = 28 half-points
                            }),
                        ],
                    }),
                ],
            }],
        });

        const blob = await Packer.toBlob(doc);
        saveAs(blob, "Bien_ban_cuoc_hop.docx");
    }
</script>

</body>
</html>
